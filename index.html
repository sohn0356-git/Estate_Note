<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현정이와 함께하는 부동산 공부</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="header-content">
        <h1>현정이와 함께하는 부동산 공부</h1>
        <p>현정이와 함께 부동산을 차근차근 공부해요</p>
      </div>
    </header>

    <main class="main-content">
      <section class="folder-section">
        <div class="section-title">
          <h2>함께하는 날짜별 콘텐츠</h2>
          <p>새로운 날짜를 추가하면 자동으로 목록에 표시됩니다.</p>
        </div>
        <div class="lesson-grid" id="day-list">
          <!-- 날짜별 폴더가 여기에 로드됩니다 -->
        </div>
      </section>

      <section class="content-section" id="selected-day-content" style="display: none;">
        <div class="section-title">
          <h2 id="selected-day-title">선택한 날짜 콘텐츠</h2>
          <p>유튜브 영상과 GPT 토막상식을 확인하세요.</p>
        </div>
        <div id="day-content">
          <!-- 선택한 날짜의 콘텐츠가 여기에 로드됩니다 -->
        </div>
      </section>

      <!-- AdSense 광고 -->
      <section class="ads-section">
        <div class="ad-container">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
               data-ad-slot="XXXXXXXXXX"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        </div>
      </section>
    </main>

    <!-- 비디오 모달 -->
    <div id="video-modal" class="video-modal">
      <div class="modal-backdrop" onclick="closeVideoModal()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-video-title"></h3>
          <button class="modal-close" onclick="closeVideoModal()">×</button>
        </div>
        <div class="modal-video-container">
          <div id="modal-video-player"></div>
        </div>
        <div class="modal-description">
          <p id="modal-video-summary"></p>
        </div>
      </div>
    </div>

    <!-- AdSense 광고 로드 -->
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </div>
</body>
</html>
